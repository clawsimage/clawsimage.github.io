<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SoBe Burger — claws Image</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f2ee;--warm:#e8e2d9;--mid:#9a9189;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',sans-serif}
body{background:var(--black);color:var(--white);font-family:var(--sans);font-weight:300}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 2.4rem;background:rgba(10,10,10,0.9)}
.back{font-size:0.72rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--warm);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
.back:hover{color:var(--white)}
.project-title{font-family:var(--serif);font-size:1.1rem;font-weight:300;font-style:italic;color:var(--white)}
.home-link{font-size:0.72rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--warm);text-decoration:none}
.home-link:hover{color:var(--white)}
.gallery{columns:3;column-gap:3px;padding-top:5rem}
@media(max-width:768px){.gallery{columns:2}}
@media(max-width:480px){.gallery{columns:1}}
.gallery img{width:100%;display:block;margin-bottom:3px;break-inside:avoid}
</style>
</head>
<body>
<div class="top-bar">
<a class="back" href="../index.html#work" onclick="history.back();return false;">&#8592; Back to Work</a>
<span class="project-title">SoBe Burger</span>
<a class="home-link" href="../index.html">claws</a>
</div>
<div class="gallery">
<img src="../images/sobe-burger/SoBe%20Burger%201879.jpg" loading="lazy"/>
</div>
</body>
</html>
